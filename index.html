
<style>
*{box-sizing:border-box;margin:0;padding:0}
@keyframes floatUp{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(160px) rotate(720deg);opacity:0}}
@keyframes heartBeat{0%,100%{transform:scale(1)}30%{transform:scale(1.3)}60%{transform:scale(0.9)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(255,180,50,0.4)}50%{box-shadow:0 0 0 7px rgba(255,180,50,0)}}

.game{
  background:#1a0a2e;
  border-radius:20px;
  padding:clamp(16px,4vw,28px) clamp(12px,4vw,24px) clamp(20px,4vw,32px);
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(10px,2.5vw,16px);
  position:relative;overflow:hidden;
  min-height:580px;
  width:100%;max-width:520px;
  margin:0 auto;
}

.bg-orbs{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;border-radius:20px}

.title-wrap{z-index:1;text-align:center}
.game-title{
  font-size:clamp(22px,5vw,30px);font-weight:500;
  background:linear-gradient(135deg,#ff6ec7,#ffb347,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-0.5px;
}
.game-sub{font-size:clamp(11px,2.5vw,13px);color:#a78bfa;margin-top:3px}

.number-track{display:flex;flex-wrap:wrap;gap:clamp(4px,1vw,6px);justify-content:center;z-index:1;max-width:100%}
.num-cell{
  width:clamp(28px,7vw,36px);height:clamp(28px,7vw,36px);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(11px,2.5vw,14px);font-weight:500;color:#e2d9f3;
  border:1.5px solid rgba(167,139,250,0.25);
  background:rgba(255,255,255,0.04);
  transition:all 0.3s;
}
.num-cell.low{background:#2d1b69;border-color:#7c3aed;color:#c4b5fd}
.num-cell.high{background:#1e3a2f;border-color:#059669;color:#6ee7b7}
.num-cell.used{background:#3b1a1a;border-color:#dc2626;color:#fca5a5;text-decoration:line-through;opacity:0.6}

.teddy-stage{
  width:clamp(110px,30vw,150px);height:clamp(110px,30vw,150px);
  z-index:1;display:flex;align-items:center;justify-content:center;
  animation:floatUp 3s ease-in-out infinite;
  flex-shrink:0;
}
.teddy-stage.do-shake{animation:shake 0.5s ease-in-out forwards}
.teddy-stage.do-pop{animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1) forwards}

.speech-bubble{
  z-index:1;
  background:#2d1b69;border:1.5px solid #7c3aed;border-radius:14px;
  padding:8px 16px;
  font-size:clamp(12px,3vw,14px);font-weight:500;color:#e2d9f3;
  text-align:center;position:relative;
  width:min(260px,88%);
  animation:slideIn 0.3s ease;
}
.speech-bubble::before{
  content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  border:7px solid transparent;border-bottom-color:#7c3aed;border-top:none;
}

.input-row{display:flex;gap:8px;align-items:center;z-index:1}
.guess-input{
  width:clamp(60px,15vw,76px);height:clamp(44px,11vw,52px);
  background:#0f0520;border:2px solid #7c3aed;border-radius:12px;
  color:#f0e6ff;font-size:clamp(20px,5vw,26px);font-weight:500;
  text-align:center;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.guess-input:focus{border-color:#c084fc;box-shadow:0 0 0 3px rgba(192,132,252,0.2)}
.guess-input::-webkit-inner-spin-button,.guess-input::-webkit-outer-spin-button{-webkit-appearance:none}

.btn-check{
  height:clamp(44px,11vw,52px);padding:0 clamp(14px,4vw,24px);
  border-radius:12px;border:none;cursor:pointer;
  font-size:clamp(13px,3.5vw,15px);font-weight:500;
  color:#1a0a2e;background:#ffb347;
  transition:all 0.15s;
  animation:glow 2s ease-in-out infinite;
  white-space:nowrap;
}
.btn-check:hover{background:#ffd080;transform:scale(1.03)}
.btn-check:active{transform:scale(0.97)}
.btn-check:disabled{background:#4a3060;color:#7a6090;animation:none;cursor:default}

.result-banner{
  z-index:1;min-height:26px;
  font-size:clamp(14px,3.5vw,18px);font-weight:500;
  text-align:center;animation:slideIn 0.3s ease;
  padding:0 8px;
}
.result-banner.correct{color:#4ade80}
.result-banner.wrong{color:#f87171}
.result-banner.info{color:#a78bfa}

.lives-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;z-index:1;max-width:100%}
.life-dot{
  width:clamp(18px,4.5vw,22px);height:clamp(18px,4.5vw,22px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;
}
.life-dot.alive svg path{fill:#f87171;animation:heartBeat 1.5s ease-in-out infinite}
.life-dot.dead svg path{fill:#3b1a3b;animation:none}

.stats-row{display:flex;gap:clamp(6px,2vw,12px);z-index:1;flex-wrap:wrap;justify-content:center}
.stat-pill{
  background:rgba(255,255,255,0.06);border:1px solid rgba(167,139,250,0.2);
  border-radius:20px;padding:5px clamp(10px,3vw,16px);
  display:flex;align-items:center;gap:5px;
  font-size:clamp(11px,2.5vw,13px);color:#c4b5fd;
}
.stat-val{font-size:clamp(13px,3.5vw,16px);font-weight:500;color:#f0e6ff}

.btn-new{
  height:36px;padding:0 18px;border-radius:9px;
  background:transparent;border:1.5px solid rgba(167,139,250,0.4);
  color:#a78bfa;font-size:clamp(11px,2.5vw,13px);cursor:pointer;z-index:1;
  transition:all 0.2s;
}
.btn-new:hover{background:rgba(124,58,237,0.2);border-color:#7c3aed;color:#e2d9f3}

.confetti-piece{position:absolute;border-radius:2px;pointer-events:none;z-index:5;animation:confettiFall 1.2s ease-in forwards}

.overlay{
  position:absolute;inset:0;z-index:10;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;animation:slideIn 0.4s ease;
  padding:20px;
}
.game-over-wrap{background:rgba(10,4,25,0.93)}
.win-wrap{background:rgba(5,20,10,0.93)}
.go-title{font-size:clamp(24px,6vw,32px);font-weight:500;color:#f87171}
.go-sub{font-size:clamp(13px,3vw,15px);color:#c4b5fd}
.go-num{font-size:clamp(36px,9vw,48px);font-weight:500;color:#ffb347}
.win-title{
  font-size:clamp(24px,6vw,32px);font-weight:500;
  background:linear-gradient(135deg,#4ade80,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.win-score{font-size:clamp(15px,4vw,20px);color:#a7f3d0;font-weight:500}
.sr-only{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
</style>

<h2 class="sr-only">Teddy Bear Guess the Number – pick 1 to 10</h2>

<div class="game" id="game">
  <div class="bg-orbs">
    <svg width="100%" height="100%" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <circle cx="60" cy="90" r="110" fill="#4c1d95" opacity="0.35"/>
      <circle cx="450" cy="70" r="80" fill="#0e7490" opacity="0.3"/>
      <circle cx="470" cy="490" r="100" fill="#7c3aed" opacity="0.25"/>
      <circle cx="30" cy="460" r="70" fill="#be185d" opacity="0.2"/>
      <circle cx="250" cy="40" r="50" fill="#d97706" opacity="0.15"/>
      <circle cx="250" cy="560" r="60" fill="#065f46" opacity="0.18"/>
    </svg>
  </div>

  <div class="title-wrap">
    <div class="game-title">Guess The Number</div>
    <div class="game-sub">I'm thinking of a number between 1 and 10...</div>
  </div>

  <div class="number-track" id="numTrack"></div>

  <div class="teddy-stage" id="teddyStage" aria-label="Teddy bear mascot">
    <svg id="teddySvg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <defs>
        <radialGradient id="fG" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#e8924a"/><stop offset="100%" stop-color="#a0521a"/></radialGradient>
        <radialGradient id="bG" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#f9c98a"/><stop offset="100%" stop-color="#d4844a"/></radialGradient>
      </defs>
      <circle cx="30" cy="30" r="17" fill="url(#fG)"/>
      <circle cx="90" cy="30" r="17" fill="url(#fG)"/>
      <circle cx="30" cy="30" r="10" fill="#d4844a"/>
      <circle cx="90" cy="30" r="10" fill="#d4844a"/>
      <ellipse cx="60" cy="80" rx="32" ry="30" fill="url(#fG)"/>
      <circle cx="60" cy="52" r="32" fill="url(#fG)"/>
      <ellipse cx="60" cy="60" rx="16" ry="12" fill="url(#bG)"/>
      <ellipse cx="60" cy="57" rx="10" ry="7" fill="#f9c98a" opacity="0.6"/>
      <circle cx="49" cy="45" r="5.5" fill="#1a0a2e"/>
      <circle cx="71" cy="45" r="5.5" fill="#1a0a2e"/>
      <circle cx="50.5" cy="43.5" r="2" fill="white"/>
      <circle cx="72.5" cy="43.5" r="2" fill="white"/>
      <ellipse id="nose" cx="60" cy="55" rx="5" ry="3.5" fill="#5a2010"/>
      <path id="mouth" d="M52 61 Q60 68 68 61" stroke="#5a2010" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="42" cy="51" rx="5" ry="3" fill="#e8607a" opacity="0.5"/>
      <ellipse cx="78" cy="51" rx="5" ry="3" fill="#e8607a" opacity="0.5"/>
      <ellipse cx="35" cy="92" rx="12" ry="9" fill="#b86020" transform="rotate(-15,35,92)"/>
      <ellipse cx="85" cy="92" rx="12" ry="9" fill="#b86020" transform="rotate(15,85,92)"/>
      <ellipse cx="60" cy="83" rx="18" ry="13" fill="url(#bG)"/>
      <polygon points="52,70 60,76 68,70 60,64" fill="#e84080"/>
      <circle cx="60" cy="70" r="3.5" fill="#b01050"/>
    </svg>
  </div>

  <div class="speech-bubble" id="bubble">What number am I thinking of?</div>

  <div class="input-row">
    <input class="guess-input" id="guessIn" type="number" min="1" max="10" placeholder="?" aria-label="Enter your guess 1 to 10"/>
    <button class="btn-check" id="btnCheck">Guess!</button>
  </div>

  <div class="result-banner info" id="resultBanner">Type a number and press Guess!</div>

  <div class="lives-bar" id="livesBar"></div>

  <div class="stats-row">
    <div class="stat-pill">Score <span class="stat-val" id="scoreVal">10</span></div>
    <div class="stat-pill">Tries <span class="stat-val" id="triesVal">0</span></div>
    <div class="stat-pill">Best <span class="stat-val" id="bestVal">--</span></div>
  </div>

  <button class="btn-new" id="btnNew">New Game</button>

  <div class="overlay game-over-wrap" id="gameOverWrap" style="display:none">
    <svg viewBox="0 0 120 120" width="clamp(80px,20vw,110px)" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="30" cy="30" r="17" fill="#a0521a"/><circle cx="90" cy="30" r="17" fill="#a0521a"/>
      <circle cx="30" cy="30" r="10" fill="#c47040"/><circle cx="90" cy="30" r="10" fill="#c47040"/>
      <ellipse cx="60" cy="80" rx="32" ry="30" fill="#a0521a"/>
      <circle cx="60" cy="52" r="32" fill="#c47040"/>
      <ellipse cx="60" cy="60" rx="16" ry="12" fill="#e8a060"/>
      <line x1="44" y1="40" x2="54" y2="50" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="54" y1="40" x2="44" y2="50" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="66" y1="40" x2="76" y2="50" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="76" y1="40" x2="66" y2="50" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="60" cy="55" rx="5" ry="3.5" fill="#5a2010"/>
      <path d="M52 65 Q60 58 68 65" stroke="#5a2010" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="60" cy="83" rx="18" ry="13" fill="#e8a060"/>
    </svg>
    <div class="go-title">Game Over!</div>
    <div class="go-sub">The secret number was</div>
    <div class="go-num" id="revealNum">?</div>
    <button class="btn-check" id="btnPlayAgainLose" style="animation:none">Play Again</button>
  </div>

  <div class="overlay win-wrap" id="winWrap" style="display:none">
    <div style="font-size:clamp(36px,10vw,52px);animation:spin 1s linear infinite;display:inline-block" aria-hidden="true">
      <svg viewBox="0 0 60 60" width="clamp(40px,10vw,60px)" xmlns="http://www.w3.org/2000/svg"><polygon points="30,4 36,22 56,22 40,34 46,52 30,40 14,52 20,34 4,22 24,22" fill="#fbbf24"/></svg>
    </div>
    <div class="win-title">You Got It!</div>
    <div class="win-score" id="winScore">Score: 10</div>
    <div style="color:#6ee7b7;font-size:clamp(12px,3vw,14px)" id="winMsg">Amazing guess!</div>
    <button class="btn-check" id="btnPlayAgainWin" style="animation:none;margin-top:4px">Play Again</button>
  </div>
</div>

<script>
var secret,score,tries,best,won;
var COLORS=['#ff6ec7','#ffb347','#67e8f9','#4ade80','#a78bfa','#f87171','#fbbf24','#34d399'];

function setMouth(t){
  var m=document.getElementById('mouth');
  if(t==='smile') m.setAttribute('d','M52 61 Q60 68 68 61');
  else if(t==='sad') m.setAttribute('d','M52 67 Q60 60 68 67');
  else m.setAttribute('d','M52 60 Q60 70 68 60');
}

function init(){
  secret=Math.floor(Math.random()*10)+1;
  score=10;tries=0;won=false;
  if(best===undefined) best=null;
  document.getElementById('gameOverWrap').style.display='none';
  document.getElementById('winWrap').style.display='none';
  document.getElementById('guessIn').disabled=false;
  document.getElementById('btnCheck').disabled=false;
  document.getElementById('guessIn').value='';
  document.getElementById('resultBanner').textContent='Type a number and press Guess!';
  document.getElementById('resultBanner').className='result-banner info';
  document.getElementById('bubble').textContent='What number am I thinking of?';
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('triesVal').textContent=tries;
  document.getElementById('bestVal').textContent=best===null?'--':best;
  setMouth('smile');
  var track=document.getElementById('numTrack');
  track.innerHTML='';
  for(var i=1;i<=10;i++){
    var d=document.createElement('div');
    d.className='num-cell';d.textContent=i;d.id='nc'+i;
    track.appendChild(d);
  }
  var bar=document.getElementById('livesBar');bar.innerHTML='';
  for(var j=0;j<10;j++){
    var h=document.createElement('div');
    h.className='life-dot alive';h.id='hrt'+j;
    h.innerHTML='<svg viewBox="0 0 20 20" width="clamp(14px,4vw,18px)" xmlns="http://www.w3.org/2000/svg"><path d="M10 17s-7-4.9-7-9a4 4 0 018 0 4 4 0 018 0c0 4.1-7 9-7 9z" fill="#f87171"/></svg>';
    bar.appendChild(h);
  }
  var ts=document.getElementById('teddyStage');
  ts.className='teddy-stage';
}

function doGuess(){
  if(won) return;
  var inp=document.getElementById('guessIn');
  var v=parseInt(inp.value,10);
  if(isNaN(v)||v<1||v>10){
    document.getElementById('bubble').textContent='Please enter 1 to 10!';
    return;
  }
  tries++;
  document.getElementById('triesVal').textContent=tries;
  var ts=document.getElementById('teddyStage');
  var rb=document.getElementById('resultBanner');
  var bub=document.getElementById('bubble');
  var cell=document.getElementById('nc'+v);

  if(v===secret){
    won=true;
    if(best===null||score>best) best=score;
    document.getElementById('bestVal').textContent=best;
    setMouth('open');
    ts.className='teddy-stage do-pop';
    rb.textContent='Correct! You nailed it!';rb.className='result-banner correct';
    bub.textContent="YAY! That's my number!";
    if(cell){cell.style.background='#065f46';cell.style.borderColor='#4ade80';cell.style.color='#4ade80';}
    setTimeout(function(){
      spawnConfetti(36);
      document.getElementById('winWrap').style.display='flex';
      document.getElementById('winScore').textContent='Score: '+score+' pts';
      document.getElementById('winMsg').textContent=tries===1?'First try — genius!':tries<=3?'Superb guessing!':'Well done!';
    },600);
    document.getElementById('guessIn').disabled=true;
    document.getElementById('btnCheck').disabled=true;
  } else {
    score=Math.max(0,score-1);
    document.getElementById('scoreVal').textContent=score;
    var dead=document.getElementById('hrt'+score);
    if(dead){
      dead.className='life-dot dead';
      dead.innerHTML='<svg viewBox="0 0 20 20" width="clamp(14px,4vw,18px)" xmlns="http://www.w3.org/2000/svg"><path d="M10 17s-7-4.9-7-9a4 4 0 018 0 4 4 0 018 0c0 4.1-7 9-7 9z" fill="#3b1a3b"/></svg>';
    }
    ts.className='teddy-stage do-shake';
    setTimeout(function(){ts.className='teddy-stage';},600);
    if(v<secret){
      if(cell) cell.className='num-cell low';
      rb.textContent='Too low! Go higher!';rb.className='result-banner wrong';
      bub.textContent='Nope! Think bigger!';
      for(var i=1;i<v;i++){var c=document.getElementById('nc'+i);if(c&&c.className==='num-cell') c.className='num-cell used';}
      setMouth('sad');
    } else {
      if(cell) cell.className='num-cell high';
      rb.textContent='Too high! Go lower!';rb.className='result-banner wrong';
      bub.textContent='Too big! Try smaller!';
      for(var j=v+1;j<=10;j++){var c2=document.getElementById('nc'+j);if(c2&&c2.className==='num-cell') c2.className='num-cell used';}
      setMouth('sad');
    }
    if(score===0){
      setTimeout(function(){
        document.getElementById('revealNum').textContent=secret;
        document.getElementById('gameOverWrap').style.display='flex';
      },800);
      document.getElementById('guessIn').disabled=true;
      document.getElementById('btnCheck').disabled=true;
    } else {
      setTimeout(function(){setMouth('smile');},700);
    }
  }
  inp.value='';inp.focus();
}

function spawnConfetti(n){
  var game=document.getElementById('game');
  for(var i=0;i<n;i++){
    (function(i){
      setTimeout(function(){
        var el=document.createElement('div');
        el.className='confetti-piece';
        el.style.left=Math.random()*100+'%';
        el.style.top=Math.random()*15+'%';
        el.style.background=COLORS[Math.floor(Math.random()*COLORS.length)];
        el.style.width=(5+Math.random()*7)+'px';
        el.style.height=(5+Math.random()*7)+'px';
        el.style.borderRadius=Math.random()>0.5?'50%':'2px';
        el.style.animationDuration=(0.8+Math.random()*0.7)+'s';
        el.style.animationDelay=(Math.random()*0.3)+'s';
        game.appendChild(el);
        setTimeout(function(){if(el.parentNode) el.parentNode.removeChild(el);},1500);
      },i*28);
    })(i);
  }
}

document.getElementById('btnCheck').addEventListener('click',doGuess);
document.getElementById('btnNew').addEventListener('click',init);
document.getElementById('btnPlayAgainLose').addEventListener('click',init);
document.getElementById('btnPlayAgainWin').addEventListener('click',init);
document.getElementById('guessIn').addEventListener('keydown',function(e){if(e.key==='Enter') doGuess();});

init();
</script>
