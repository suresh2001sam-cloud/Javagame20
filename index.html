
<style>
*{box-sizing:border-box;margin:0;padding:0}
@keyframes floatUp{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-8px) rotate(-4deg)}40%{transform:translateX(8px) rotate(4deg)}60%{transform:translateX(-6px) rotate(-2deg)}80%{transform:translateX(6px) rotate(2deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(180px) rotate(720deg);opacity:0}}
@keyframes heartBeat{0%,100%{transform:scale(1)}30%{transform:scale(1.25)}60%{transform:scale(0.95)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(255,180,50,0.5)}50%{box-shadow:0 0 0 8px rgba(255,180,50,0)}}

.game{
  background:#1a0a2e;
  border-radius:24px;
  padding:28px 20px 32px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  position:relative;overflow:hidden;min-height:640px;
}

.bg-orbs{position:absolute;inset:0;pointer-events:none;z-index:0}

.title-wrap{z-index:1;text-align:center}
.game-title{
  font-size:30px;font-weight:500;
  background:linear-gradient(135deg,#ff6ec7,#ffb347,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-0.5px;
}
.game-sub{font-size:13px;color:#a78bfa;margin-top:4px}

.number-track{
  display:flex;gap:6px;z-index:1;
}
.num-cell{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:500;color:#e2d9f3;
  border:1.5px solid rgba(167,139,250,0.25);
  background:rgba(255,255,255,0.04);
  transition:all 0.3s;
}
.num-cell.low{background:#2d1b69;border-color:#7c3aed;color:#c4b5fd}
.num-cell.high{background:#1e3a2f;border-color:#059669;color:#6ee7b7}
.num-cell.used{background:#3b1a1a;border-color:#dc2626;color:#fca5a5;text-decoration:line-through;opacity:0.6}

.teddy-stage{
  width:160px;height:160px;z-index:1;
  display:flex;align-items:center;justify-content:center;
  animation:floatUp 3s ease-in-out infinite;
}
.teddy-stage.shake{animation:shake 0.5s ease-in-out;animation-fill-mode:forwards}
.teddy-stage.pop{animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1)}

.speech-bubble{
  z-index:1;
  background:#2d1b69;
  border:1.5px solid #7c3aed;
  border-radius:16px;
  padding:10px 18px;
  font-size:14px;font-weight:500;color:#e2d9f3;
  text-align:center;
  position:relative;
  min-width:220px;
  animation:slideIn 0.3s ease;
}
.speech-bubble::before{
  content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  border:8px solid transparent;border-bottom-color:#7c3aed;border-top:none;
}

.input-row{display:flex;gap:10px;align-items:center;z-index:1}

.guess-input{
  width:76px;height:52px;
  background:#0f0520;
  border:2px solid #7c3aed;
  border-radius:14px;
  color:#f0e6ff;
  font-size:26px;font-weight:500;
  text-align:center;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.guess-input:focus{border-color:#c084fc;box-shadow:0 0 0 3px rgba(192,132,252,0.2)}
.guess-input::-webkit-inner-spin-button,.guess-input::-webkit-outer-spin-button{-webkit-appearance:none}

.btn-check{
  height:52px;padding:0 24px;
  border-radius:14px;
  border:none;cursor:pointer;
  font-size:15px;font-weight:500;
  color:#1a0a2e;
  background:#ffb347;
  transition:all 0.15s;
  animation:glow 2s ease-in-out infinite;
}
.btn-check:hover{background:#ffd080;transform:scale(1.03)}
.btn-check:active{transform:scale(0.97)}
.btn-check:disabled{background:#4a3060;color:#7a6090;animation:none;cursor:default}

.result-banner{
  z-index:1;
  min-height:30px;
  font-size:18px;font-weight:500;
  text-align:center;
  animation:slideIn 0.3s ease;
}
.result-banner.correct{color:#4ade80}
.result-banner.wrong{color:#f87171}
.result-banner.info{color:#a78bfa}

.stats-row{display:flex;gap:12px;z-index:1}
.stat-pill{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(167,139,250,0.2);
  border-radius:20px;padding:6px 16px;
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:#c4b5fd;
}
.stat-val{font-size:16px;font-weight:500;color:#f0e6ff}

.lives-bar{display:flex;gap:4px;z-index:1}
.life-dot{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  transition:all 0.3s;
}
.life-dot.alive{color:#f87171;animation:heartBeat 1.5s ease-in-out infinite}
.life-dot.dead{color:#3b1a3b;animation:none}

.btn-new{
  height:38px;padding:0 20px;border-radius:10px;
  background:transparent;
  border:1.5px solid rgba(167,139,250,0.4);
  color:#a78bfa;font-size:13px;cursor:pointer;z-index:1;
  transition:all 0.2s;
}
.btn-new:hover{background:rgba(124,58,237,0.2);border-color:#7c3aed;color:#e2d9f3}

.confetti-piece{
  position:absolute;width:8px;height:8px;border-radius:2px;
  pointer-events:none;z-index:5;
  animation:confettiFall 1.2s ease-in forwards;
}

.game-over-wrap{
  position:absolute;inset:0;z-index:10;
  background:rgba(10,4,25,0.92);
  border-radius:24px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  animation:slideIn 0.4s ease;
}
.go-title{font-size:32px;font-weight:500;color:#f87171}
.go-sub{font-size:15px;color:#c4b5fd}
.go-num{font-size:48px;font-weight:500;color:#ffb347}

.win-wrap{
  position:absolute;inset:0;z-index:10;
  background:rgba(5,20,10,0.92);
  border-radius:24px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;
  animation:slideIn 0.4s ease;
}
.win-title{font-size:32px;font-weight:500;background:linear-gradient(135deg,#4ade80,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.win-score{font-size:20px;color:#a7f3d0;font-weight:500}
</style>

<h2 style="position:absolute;left:-9999px">Teddy bear guess the number game — pick 1 to 10</h2>

    </div>

    <div style="color:#6ee7b7;font-size:14px" id="winMsg">Amazing guess!</div>
    <button class="btn-check" onclick="newGame()" style="animation:none;margin-top:4px">Play Again</button>

<script>
var secret, score, tries, best, won, cells;
var CONFETTI_COLORS = ['#ff6ec7','#ffb347','#67e8f9','#4ade80','#a78bfa','#f87171','#fbbf24','#34d399'];

function init(){
  secret = Math.floor(Math.random()*10)+1;
  score = 10; tries = 0; won = false;
  if(best===undefined) best = null;

  document.getElementById('gameOverWrap').style.display='none';
  document.getElementById('winWrap').style.display='none';
  document.getElementById('guessIn').disabled=false;
  document.getElementById('btnCheck').disabled=false;
  document.getElementById('guessIn').value='';
  document.getElementById('resultBanner').textContent='Type a number and press Guess!';
  document.getElementById('resultBanner').className='result-banner info';
  document.getElementById('bubble').textContent="What number am I thinking of?";
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('triesVal').textContent=tries;
  document.getElementById('bestVal').textContent=best===null?'--':best;
  setMouth('smile');

  var track = document.getElementById('numTrack');
  var track2 = document.getElementById('numTrackBottom');
  track.innerHTML=''; track2.innerHTML='';
  cells=[];
  for(var i=1;i<=10;i++){
    var d=document.createElement('div');
    d.className='num-cell'; d.textContent=i; d.id='nc'+i;
    track.appendChild(d);
    cells.push(d);
  }

  var bar=document.getElementById('livesBar'); bar.innerHTML='';
  for(var j=0;j<10;j++){
    var h=document.createElement('div');
    h.className='life-dot alive'; h.id='hrt'+j;
    h.innerHTML='<svg viewBox="0 0 20 20" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M10 17s-7-4.9-7-9a4 4 0 018 0 4 4 0 018 0c0 4.1-7 9-7 9z" fill="#f87171"/></svg>';
    bar.appendChild(h);
  }

  var ts=document.getElementById('teddyStage');
  ts.className='teddy-stage';
}

function setMouth(type){
  var m=document.getElementById('mouth');
  if(type==='smile') m.setAttribute('d','M52 61 Q60 68 68 61');
  else if(type==='sad') m.setAttribute('d','M52 67 Q60 60 68 67');
  else if(type==='open') m.setAttribute('d','M52 60 Q60 70 68 60');
}

function doGuess(){
  if(won) return;
  var inp=document.getElementById('guessIn');
  var v=parseInt(inp.value,10);
  if(isNaN(v)||v<1||v>10){
    document.getElementById('bubble').textContent='Please enter 1 to 10!';
    return;
  }

  tries++;
  document.getElementById('triesVal').textContent=tries;

  var ts=document.getElementById('teddyStage');
  var rb=document.getElementById('resultBanner');
  var bub=document.getElementById('bubble');
  var cell=document.getElementById('nc'+v);

  if(v===secret){
    won=true;
    if(best===null||score>best) best=score;
    document.getElementById('bestVal').textContent=best;
    setMouth('open');
    ts.className='teddy-stage pop';
    rb.textContent='Correct! You nailed it!'; rb.className='result-banner correct';
    bub.textContent='YAY! That\'s my number!';
    cell.className='num-cell';
    cell.style.background='#065f46'; cell.style.borderColor='#4ade80'; cell.style.color='#4ade80';
    setTimeout(function(){
      spawnConfetti(40);
      document.getElementById('winWrap').style.display='flex';
      document.getElementById('winScore').textContent='Score: '+score+' pts';
      document.getElementById('winMsg').textContent=tries===1?'First try — genius!':tries<=3?'Superb guessing!':'Well done!';
    },600);
    document.getElementById('guessIn').disabled=true;
    document.getElementById('btnCheck').disabled=true;
  } else {
    score=Math.max(0,score-1);
    document.getElementById('scoreVal').textContent=score;

    var dead=document.getElementById('hrt'+(score));
    if(dead){ dead.className='life-dot dead'; dead.innerHTML='<svg viewBox="0 0 20 20" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M10 17s-7-4.9-7-9a4 4 0 018 0 4 4 0 018 0c0 4.1-7 9-7 9z" fill="#3b1a3b"/></svg>'; }

    ts.className='teddy-shake'; 
    setTimeout(function(){ts.className='teddy-stage'},600);

    if(v<secret){
      cell.className='num-cell low';
      rb.textContent='Too low! Go higher!'; rb.className='result-banner wrong';
      bub.textContent='Nope! Think bigger!';
      for(var i=1;i<v;i++){ var c=document.getElementById('nc'+i); if(c&&c.className==='num-cell low') {} else if(c) c.className='num-cell used'; }
      document.getElementById('nc'+v).style.borderColor='#7c3aed';
      setMouth('sad');
    } else {
      cell.className='num-cell high';
      rb.textContent='Too high! Go lower!'; rb.className='result-banner wrong';
      bub.textContent='Too big! Try smaller!';
      for(var j=v+1;j<=10;j++){ var c2=document.getElementById('nc'+j); if(c2) c2.className='num-cell used'; }
      document.getElementById('nc'+v).style.borderColor='#0891b2';
      setMouth('sad');
    }

    if(score===0){
      setTimeout(function(){
        document.getElementById('revealNum').textContent=secret;
        document.getElementById('gameOverWrap').style.display='flex';
      },800);
      document.getElementById('guessIn').disabled=true;
      document.getElementById('btnCheck').disabled=true;
    } else {
      setTimeout(function(){setMouth('smile')},700);
    }
  }
  inp.value='';
  inp.focus();
}

function spawnConfetti(n){
  var game=document.getElementById('game');
  for(var i=0;i<n;i++){
    (function(i){
      setTimeout(function(){
        var el=document.createElement('div');
        el.className='confetti-piece';
        el.style.left=Math.random()*100+'%';
        el.style.top=Math.random()*20+'%';
        el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
        el.style.width=(6+Math.random()*8)+'px';
        el.style.height=(6+Math.random()*8)+'px';
        el.style.borderRadius=Math.random()>0.5?'50%':'3px';
        el.style.animationDuration=(0.8+Math.random()*0.8)+'s';
        el.style.animationDelay=(Math.random()*0.4)+'s';
        game.appendChild(el);
        setTimeout(function(){el.remove()},1600);
      },i*30);
    })(i);
  }
}

function newGame(){ init(); }

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('guessIn').addEventListener('keydown',function(e){if(e.key==='Enter') doGuess();});
});

init();
document.getElementById('guessIn').addEventListener('keydown',function(e){if(e.key==='Enter') doGuess();});
</script>
